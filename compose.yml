services:
  postgres:
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d quiz_builder"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
